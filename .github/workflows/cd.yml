name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.15.0

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Auth with Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - name: Build the Docker image and push it to Google Artifact Registry
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-500911/notely-ar-repo/notely:latest .

      - name: Run the DB migration
        run: npm run db:migrate

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-500911/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-500911 --max-instances=4
